<div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="productModalTitle">Nuevo Producto</h5>

                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar">
                </button>
            </div>

            <div class="modal-body">

                <div class="form-grid">
                    <div class="form-group span-2">
                        <label><i class="fas fa-box"></i> Nombre del producto *</label>
                        <input type="text" id="pName" class="validarProducto">
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> Categoría *</label>
                        <select id="pCategory" class="validarProducto">
                            <option value="">Selecciona una categoría</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-dollar-sign"></i> Precio base *</label>
                        <input type="number" id="pPrice" class="validarProducto">
                    </div>

                    <div class="form-group span-2">
                        <label><i class="fas fa-align-left"></i> Descripción</label>
                        <textarea id="pDesc" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-cubes"></i> Stock inicial</label>
                        <input type="number" id="pStock" value="0" class="validarProducto">
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-cube"></i> Stock minimo</label>
                        <input type="text" id="pStockMinimo" value="1" class="validarProducto">
                    </div>
                </div>

                <!-- <div class="section-divider">
                    <span><i class="fas fa-palette"></i> Variantes</span>
                </div>

                <div class="variants-section">
                    <div class="variants-header">
                        <span class="variants-title">
                            <i class="fas fa-layer-group"></i> Tallas, colores, etc.
                        </span>

                        <button class="btn btn-secondary btn-sm"
                                onclick="modals.addVariantRow()">
                            <i class="fas fa-plus"></i>
                            Agregar variante
                        </button>
                    </div>

                    <div id="variantRows" class="variants-list"></div>

                    <p class="variants-hint" id="variantsHint">
                        <i class="fas fa-info-circle"></i>
                        Sin variantes. Agrega si el producto tiene tallas, colores, etc.
                    </p>
                </div> -->

            </div>

            <div class="modal-footer">
                <button class="app-btn app-btn-primary" onclick="productsView.saveProduct()">
                    <i class="fas fa-save"></i>
                    Guardar producto
                </button>
            </div>

        </div>
    </div>
</div>

<div class="modal fade" id="variantPickerModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-md">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="vpTitle">
                    <i class="fas fa-palette"></i>
                    Selecciona variante
                </h5>

                <button class="btn-close" data-bs-dismiss="modal">
                </button>
            </div>

            <div class="modal-body" id="vpBody"></div>

            <div class="modal-footer">
                <button class="app-btn app-btn-primary" onclick="salesView.addToCartFromPicker()">
                    <i class="fas fa-cart-plus"></i>
                    Agregar al carrito
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="categoryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-md modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="categoryModalTitle">
                    Nueva categoría
                </h5>
                <button class="btn-close" data-bs-dismiss="modal">
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>
                        <i class="fas fa-tag"></i>
                        Nombre
                    </label>
                    <input id="cName" type="text">
                </div>
            </div>
            <div class="modal-footer">
                <button class="app-btn app-btn-primary" onclick="categoriesView.saveCategory()">
                    <i class="fas fa-save"></i>
                    Guardar
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="stockModal">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5>
                    <i class="fas fa-boxes"></i>
                    Movimiento de stock
                </h5>
                <button class="btn-close" data-bs-dismiss="modal">
                </button>
            </div>
            <div class="modal-body form-grid">
                <input type="hidden" id="stockProductId">
                <div class="form-group">
                    <label>
                        Producto
                    </label>
                    <input id="stockProductName" readonly>
                </div>
                <div class="form-group">
                    <label>
                        Tipo movimiento
                    </label>

                    <select id="stockType">

                        <option value="0">
                            Entrada
                        </option>

                        <option value="1">
                            Salida
                        </option>

                    </select>

                </div>



                <div class="form-group">

                    <label>
                        Cantidad
                    </label>

                    <input type="number" id="stockQuantity" min="1">

                </div>



                <div class="form-group">

                    <label>
                        Motivo
                    </label>


                    <textarea id="stockReason" placeholder="Compra, venta, ajuste...">
</textarea>


                </div>



            </div>



            <div class="modal-footer">

                <button class="app-btn app-btn-primary" onclick="stocksView.saveMovement()">

                    Guardar

                </button>


            </div>


        </div>

    </div>

</div>
